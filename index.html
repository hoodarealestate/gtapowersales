<!DOCTYPE html>
<html>
<head>
    <title>GTA Power of Sale Properties</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 40px auto; }
        .card { background: #16213e; padding: 20px; border-radius: 10px; }
        .price { color: #00d9ff; font-size: 24px; font-weight: bold; }
        .btn { background: #00d9ff; color: #1a1a2e; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 10px; }
        #gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; }
        .gate-box { background: #16213e; padding: 40px; border-radius: 10px; text-align: center; }
        input { padding: 10px; margin: 10px; width: 300px; border-radius: 5px; border: 1px solid #00d9ff; }
    </style>
</head>
<body>
    <h1>🔥 GTA Power of Sale Properties</h1>
    <p>Exclusive distressed properties updated daily</p>
    
    <!-- Email Gate (TRREB Compliance) -->
    <div id="gate">
        <div class="gate-box">
            <h2>Register to View Properties</h2>
            <p>TRREB requires registration to view MLS data</p>
            <form id="registerForm">
                <input type="text" id="name" placeholder="Your Name" required><br>
                <input type="email" id="email" placeholder="Your Email" required><br>
                <input type="tel" id="phone" placeholder="Your Phone" required><br>
                <button type="submit" class="btn">View Properties Now</button>
            </form>
        </div>
    </div>

    <div id="loading">Loading properties...</div>
    <div id="grid" class="grid" style="display:none;"></div>

    <script>
        // Check if user already registered
        if(localStorage.getItem('registered') === 'true') {
            document.getElementById('gate').style.display = 'none';
            loadProperties();
        }

        // Handle registration
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            
            // Save to localStorage
            localStorage.setItem('registered', 'true');
            localStorage.setItem('userName', name);
            
            // Send to Formspree (replace YOUR_FORM_ID)
            fetch('https://formspree.io/f/YOUR_FORM_ID', {
                method: 'POST',
                body: JSON.stringify({ name, email, phone, interested: 'Power of Sale Properties' }),
                headers: { 'Content-Type': 'application/json' }
            });
            
            // Hide gate and show properties
            document.getElementById('gate').style.display = 'none';
            loadProperties();
        });

        // Load properties
        function loadProperties() {
            fetch('properties.json')
                .then(r => r.json())
                .then(props => {
                    document.getElementById('loading').style.display = 'none';
                    const grid = document.getElementById('grid');
                    grid.style.display = 'grid';
                    
                    props.forEach(p => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="price">${p.price}</div>
                            <h3>${p.address}</h3>
                            <p>🛏️ ${p.beds} Beds | 🛁 ${p.baths} Baths | 📅 ${p.dom} Days on Market</p>
                            <p>${p.type}</p>
                            <a href="mailto:your.email@example.com?subject=Interested in ${p.mls}" class="btn">Contact Me About This</a>
                        `;
                        grid.appendChild(card);
                    });
                });
        }
    </script>
</body>
</html>
