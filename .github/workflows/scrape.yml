name: Update Property Listings

# This creates the "Run Workflow" button where you can paste your link
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Paste the new realmmlp.ca share link here'
        required: true
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        env:
          TARGET_URL: ${{ inputs.target_url }}
        run: python scrape.py

      - name: Commit and Push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add properties.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update property listings" && git push)
